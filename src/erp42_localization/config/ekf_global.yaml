ekf_filter_node_global:
    ros__parameters:
        frequency: 30.0
        sensor_timeout: 0.1
        two_d_mode: true
        publish_tf: true
        map_frame: map
        odom_frame: odom
        base_link_frame: base_link
        world_frame: map

        odom0: /ackermann_steering_controller/odometry
        odom0_config: [true,  true,  false,
                       false, false, false,
                       true,  true,  false,
                       false, false, true,
                       false, false, false]

        imu0: /erp42/imu/data
        imu0_config: [false, false, false,
                      false, false, true,
                      false, false, false,
                      false, false, true,
                      true,  false, false]
        imu0_remove_gravitational_acceleration: true

        odom1: /odometry/gps
        odom1_config: [true,  true,  false,
                       false, false, false,
                       false, false, false,
                       false, false, false,
                       false, false, false]