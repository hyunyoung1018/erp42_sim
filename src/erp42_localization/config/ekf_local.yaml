ekf_filter_node_local:
    ros__parameters:
        frequency: 30.0
        sensor_timeout: 0.1
        two_d_mode: true
        publish_tf: true
        map_frame: map
        odom_frame: odom
        base_link_frame: base_link
        world_frame: odom 

        odom0: /ackermann_steering_controller/odometry
        odom0_config: [true,  true,  false, # x, y, z
                       false, false, false, # r p y
                       true,  true,  false, # vx vy vz
                       false, false, true,  # vr vp vy
                       false, false, false] # ax ay az

        imu0: /erp42/imu/data
        imu0_config: [false, false, false,
                      false, false, true,
                      false, false, false,
                      false, false, true,
                      true,  false, false]
        imu0_remove_gravitational_acceleration: true