controller_manager:
  ros__parameters:
    update_rate: 50
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

ackermann_steering_controller:
  ros__parameters:
    reference_timeout: 2.0
    front_steering: true
    open_loop: false
    velocity_rolling_window_size: 10
    position_feedback: true
    use_stamped_vel: false

    rear_wheels_names: ["left_back_wheel_joint", "right_back_wheel_joint"]
    front_wheels_names: ["left_front_disk_wheel_joint", "right_front_disk_wheel_joint"]

    wheelbase: 1.02
    front_wheel_track: 1.02
    rear_wheel_track: 1.02
    front_wheels_radius: 0.28
    rear_wheels_radius: 0.28